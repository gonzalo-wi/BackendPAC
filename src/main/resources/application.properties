spring.application.name=pac

# Carga automática del .env para desarrollo local (ignorado si no existe)
spring.config.import=optional:file:.env[.properties]

# ──────────────────────────────────────────────
# DataSource / JPA
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ──────────────────────────────────────────────
# Integraciones externas
# ──────────────────────────────────────────────
pac.integrations.aguas.url=${URL_BASE_AGUAS}
pac.integrations.aguas.cobranza-url=${URL_BASE_AGUAS_COBRANZA}
pac.integrations.minibank.url=${URL_BASE_MINIBANK}
pac.integrations.minibank.username=${USERNAME_MINIBANK:}
pac.integrations.minibank.password=${PASSWORD_MINIBANK:}
pac.integrations.minibank.cashier-identifiers[1]=${BANK_CIUDADELA_1}
pac.integrations.minibank.cashier-identifiers[2]=${BANK_CIUDADELA_2}
pac.integrations.minibank.cashier-identifiers[3]=${BANK_LA_PLATA_3}
pac.integrations.minibank.cashier-identifiers[4]=${BANK_LOMAS_DE_ZAMORA_4}

# ──────────────────────────────────────────────
# Políticas de diferencias
# ──────────────────────────────────────────────
pac.difference.surplus-high-threshold=5000
pac.difference.shortage-critical-threshold=5000

# ──────────────────────────────────────────────
# Schedulers
# ──────────────────────────────────────────────
pac.scheduler.minibank.fixed-delay-ms=300000
pac.scheduler.aguas.fixed-delay-ms=600000
pac.scheduler.health.fixed-delay-ms=120000

# ──────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ──────────────────────────────────────────────
# Resilience4j — Circuit Breaker
# ──────────────────────────────────────────────
resilience4j.circuitbreaker.instances.minibank.sliding-window-size=10
resilience4j.circuitbreaker.instances.minibank.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.minibank.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.minibank.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.aguas.sliding-window-size=10
resilience4j.circuitbreaker.instances.aguas.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aguas.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aguas.permitted-number-of-calls-in-half-open-state=3

# ──────────────────────────────────────────────
# Resilience4j — Retry
# ──────────────────────────────────────────────
resilience4j.retry.instances.minibank.max-attempts=3
resilience4j.retry.instances.minibank.wait-duration=2s
resilience4j.retry.instances.minibank.retry-exceptions=feign.FeignException

resilience4j.retry.instances.aguas.max-attempts=3
resilience4j.retry.instances.aguas.wait-duration=2s
resilience4j.retry.instances.aguas.retry-exceptions=feign.FeignException

# ──────────────────────────────────────────────
# Spring Cloud OpenFeign
# ──────────────────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=false
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000

# ──────────────────────────────────────────────
# Scheduling
# ──────────────────────────────────────────────
spring.task.scheduling.pool.size=3
