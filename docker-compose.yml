services:

  db:
    image: postgres:16-alpine
    container_name: pac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pac
      POSTGRES_USER: pac_user
      POSTGRES_PASSWORD: pac_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pac_user -d pac"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pac-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pac
      SPRING_DATASOURCE_USERNAME: pac_user
      SPRING_DATASOURCE_PASSWORD: pac_pass
      PAC_INTEGRATIONS_MINIBANK_URL: ${MINIBANK_URL:-http://minibank-host/api}
      PAC_INTEGRATIONS_AGUAS_URL: ${AGUAS_URL:-http://aguas-host/api}
    ports:
      - "8080:8080"

volumes:
  pg_data:
